<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One PieceDle - MultiMode</title>
    <style>
        :root {
            --op-gold: #c9a050;
            --op-dark: #0a0a0a;
            --correct: #1d804c;
            --wrong: #8d2022;
            --partial: #c9a050;
            --cell-bg: rgba(0, 0, 0, 0.6);
        }

        .berry-icon { width: 14px; height: auto; vertical-align: middle; margin-right: 4px; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--op-dark);
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('img/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 98%; max-width: 1400px; text-align: center; padding: 20px; }
        #game-interface { display: none; }
        .controls { margin-bottom: 25px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        
        /* Menu Buttons */
.menu-btn {
    position: relative; 
    height: 120px; 
    border: 3px solid var(--op-gold);
    border-radius: 15px; 
    overflow: hidden; 
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s; 
    display: flex;
    align-items: center; 
    justify-content: center;
    background-color: #000; /* Fond noir au cas où l'image charge mal */
        }
        .menu-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(201, 160, 80, 0.5); }

.menu-btn img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    position: absolute; 
    top: 0; 
    left: 0; 
    z-index: 1; 
    opacity: 0.6; /* Un peu plus sombre pour faire ressortir le texte blanc */
    transition: opacity 0.3s;
}

.menu-btn:hover img {
    opacity: 0.8;
}

.menu-btn span { 
    position: relative; 
    z-index: 2; 
    font-size: 2.2rem; 
    font-weight: 900; 
    text-shadow: 3px 3px 10px black; 
    color: white; 
    text-transform: uppercase; 
}
    
    .wanted-img-wrapper {
        width: 300px;
        height: 300px;
        border: 5px solid var(--op-gold);
        border-radius: 15px;
        overflow: hidden;
        background: #000;
        margin-bottom: 20px;
        box-shadow: 0 0 25px rgba(201, 160, 80, 0.4);
    }
    
    #wanted-target-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        /* Le filtre de base : Noir et blanc + Flou intense */
        filter: grayscale(1) blur(30px);
        transition: filter 0.5s ease;
    }

    .cols-wanted { grid-template-columns: 90px 1fr; }

        /* Legend Style */
        .legend {
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
            margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.5);
            border-radius: 12px; border: 1px solid rgba(201, 160, 80, 0.3); font-size: 0.85rem;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .box { width: 18px; height: 18px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); }

        /* Search & Grid */
        .search-box { position: relative; max-width: 600px; margin: 0 auto 30px; }
        input {
            width: 100%; padding: 18px; background: rgba(30, 30, 30, 0.9); border: 2px solid #444;
            color: white; border-radius: 12px; font-size: 1.1em; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--op-gold); box-shadow: 0 0 15px rgba(201, 160, 80, 0.3); }

        #suggestions {
            position: absolute; width: 100%; background: #1a1a1a; z-index: 100;
            list-style: none; padding: 5px; margin: 5px 0 0; border-radius: 8px;
            max-height: 300px; overflow-y: auto; border: 1px solid #444;
        }
        #suggestions li { padding: 10px; cursor: pointer; border-radius: 6px; margin-bottom: 2px; display: flex; align-items: center; gap: 15px; text-align: left; }
        #suggestions li:hover { background: #333; }
        #suggestions img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--op-gold); }

        .grid-container { overflow-x: auto; padding: 10px; }
        .grid-header, .row { display: grid; gap: 8px; min-width: 1150px; margin-bottom: 12px; }
        .cols-char { grid-template-columns: 90px repeat(9, 1fr); }
        .cols-fruit { grid-template-columns: 90px repeat(5, 1fr); }

        .cell {
            background: var(--cell-bg); height: 100px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 700;
            border-radius: 10px; border: 2px solid rgba(255,255,255,0.1); text-align: center;
            padding: 8px; box-sizing: border-box;
        }
        .cell img.char-pic { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .correct { background-color: var(--correct) !important; }
        .wrong { background-color: var(--wrong) !important; }
        .partial { background-color: var(--partial) !important; color: #000; }
        .arrow { font-size: 1.4em; margin-top: 5px; }
        
        .btn { padding: 12px 20px; border: 2px solid var(--op-gold); background: rgba(0,0,0,0.5); color: var(--op-gold); cursor: pointer; border-radius: 8px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: var(--op-gold); color: white; }
        #hint-display { margin: 10px auto; padding: 10px; color: var(--op-gold); font-style: italic; font-weight: bold; min-height: 20px; text-shadow: 1px 1px 5px black; }

        footer {
            margin-top: 50px; padding: 20px; text-align: center; width: 100%;
            background: rgba(0, 0, 0, 0.8); border-top: 2px solid var(--op-gold);
            font-size: 0.9rem; line-height: 1.6;
        }
        .footer-credit { color: var(--op-gold); font-weight: bold; letter-spacing: 1px; }
        .footer-discord { color: #7289da; font-family: monospace; }
        .footer-fun { font-style: italic; opacity: 0.8; max-width: 600px; margin: 10px auto 0; }
    </style>
</head>

<div class="container">
    <h1 onclick="location.reload()" style="cursor:pointer; letter-spacing: 8px; font-size: 3em; margin: 30px 0; text-shadow: 3px 3px 10px rgba(0,0,0,0.8);">ONEPIECEDLE</h1>

<div id="menu-screen" style="display: flex; flex-direction: column; gap: 20px; max-width: 600px; margin: 0 auto;">
    <div class="menu-btn" onclick="startMode('char')">
        <img src="img/mode_classique.png" alt="Personnage">
        <span>PERSONNAGE</span>
    </div>
    <div class="menu-btn" onclick="startMode('fruit')">
        <img src="img/mode_fruit.png" alt="Fruit">
        <span>FRUIT</span>
    </div>
    <div class="menu-btn" onclick="startMode('wanted')">
        <img src="img/mode_wanted.png" alt="Wanted">
        <span>WANTED</span>
    </div>
</div>

<div id="game-interface" style="display: none;">
    
    <div id="wanted-container" style="display: none; flex-direction: column; align-items: center; margin-bottom: 20px;">
        <div class="wanted-img-wrapper">
            <img id="wanted-target-img" src="" alt="Mystery Character" style="width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) blur(30px); transition: filter 0.5s ease;">
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="location.reload()">Menu</button>
        <button class="btn" onclick="initGame()">Nouveau</button>
        <button class="btn" onclick="showHint()" id="hintBtn">Indice</button>
        <button class="btn" onclick="giveUp()" style="color:#ff4444; border-color:#ff4444">Abandonner</button>
    </div>

    <div class="legend" id="game-legend">
        <div class="legend-item"><div class="box" style="background:var(--correct)"></div> Correct</div>
        <div class="legend-item"><div class="box" style="background:var(--partial)"></div> Pas loin</div>
        <div class="legend-item"><div class="box" style="background:var(--wrong)"></div> Incorrect</div>
        <div class="legend-item"><span>▼</span> Plus bas</div>
        <div class="legend-item"><span>▲</span> Plus haut</div>
    </div>

    <div id="hint-display"></div>

    <div class="search-box">
        <input type="text" id="guessInput" placeholder="Écrivez un nom..." autocomplete="off">
        <ul id="suggestions"></ul>
    </div>

    <div class="grid-container">
        <div id="grid-header" class="grid-header"></div>
        <div id="grid"></div>
    </div>
</div>

<footer>
    <div class="footer-credit">Developed by Ratek</div>
    <div class="footer-discord">Contact Discord : ungrosnoobendef</div>
    <div class="footer-fun">

</footer>

        { name: "Ochoku", crew: "Rocks Pirates", fruit: "Aucun", origin: "Inconnu", bounty: 0, age: 72, height: 350, weight: 280, arc: "Elbaf", haki: "Aucun", race: "Humain", gender: "Homme" },
        { name: "Kyo Hache d Argent", crew: "Rocks Pirates", fruit: "Aucun", origin: "Inconnu", bounty: 0, age: 70, height: 280, weight: 190, arc: "Elbaf", haki: "Aucun", race: "Humain", gender: "Homme" },
        { name: "Eris", crew: "Davy Family", fruit: "Aucun", origin: "Inconnu", bounty: 0, age: 24, height: 172, weight: 58, arc: "Elbaf", haki: "Aucun", race: "Humain", gender: "Femme" },
        { name: "Satchels Maffey", crew: "Knights of God", fruit: "Aucun", origin: "Grand Line", bounty: 0, age: 33, height: 178, weight: 62, arc: "Elbaf", haki: "Aucun", race: "Humain", gender: "Femme" },
        { name: "Polo Gram", crew: "Whitebeard Pirates", fruit: "Aucun", origin: "Inconnu", bounty: 0, age: 55, height: 205, weight: 105, arc: "Elbaf", haki: "Aucun", race: "Humain", gender: "Homme" },
        { name: "Blueno", crew: "CP0", fruit: "Paramecia", origin: "North Blue", bounty: 0, age: 32, height: 258, weight: 110, arc: "Water Seven", haki: "👀, 🦾", race: "Humain", gender: "Homme" }
        ],
        fruit: [
            { name: "Gomu Gomu no Mi", owner: "Luffy", type: "Zoan", origin: "Inconnu", awakening: "Oui", appearance: "Violet", arc: "Romance Dawn" },
            { name: "Mera Mera no Mi", owner: "Sabo", type: "Logia", origin: "Dressrosa", awakening: "Non", appearance: "Orange", arc: "Enies Lobby" },
            { name: "Ope Ope no Mi", owner: "Law", type: "Paramecia", origin: "North Blue", awakening: "Oui", appearance: "Rouge", arc: "Archipel Sabaody" },
            { name: "Hito Hito no Mi: Model Daibutsu", owner: "Sengoku", type: "Zoan", origin: "Inconnu", awakening: "Aucun", appearance: "Doré", arc: "Marineford" }
        ]
    };

	let target;
	let currentMode = 'char';
	let gameOver = false;
	let guessedNames = [];
	let attempts = 0;

	const input = document.getElementById('guessInput');
	const list = document.getElementById('suggestions');
	const hintDisplay = document.getElementById('hint-display');
	const wantedImg = document.getElementById('wanted-target-img');
	const wantedContainer = document.getElementById('wanted-container');

	function formatBounty(num) {
    if (num === 0) return "0";
    if (num >= 1000000000) return (num / 1000000000).toFixed(1) + " Md";
    if (num >= 1000000) return (num / 1000000).toFixed(1) + " M";
    return num.toLocaleString();
}

	function startMode(mode) {
    currentMode = mode;
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-interface').style.display = 'block';
    
    wantedContainer.style.display = (mode === 'wanted') ? 'flex' : 'none';
    const header = document.getElementById('grid-header');

    if(mode === 'char') {
        header.className = "grid-header cols-char";
        header.innerHTML = "<div>Perso</div><div>Genre</div><div>Race</div><div>Equipage</div><div>Fruit</div><div>Haki</div><div>Prime</div><div>Taille</div><div>Origine</div><div>Arc</div>";
        input.placeholder = "Nom d'un personnage...";
    } else if(mode === 'fruit') {
        header.className = "grid-header cols-fruit";
        header.innerHTML = "<div>Fruit</div><div>Utilisateur</div><div>Type</div><div>Couleur</div><div>Forme</div><div>Arc</div>";
        input.placeholder = "Nom d'un fruit...";
    } else {
        header.className = "grid-header cols-wanted";
        header.innerHTML = "<div>Image</div><div>Nom du personnage</div>";
        input.placeholder = "Qui est ce personnage flouté ?";
    }
    initGame();
}

	function initGame() {
    gameOver = false;
    guessedNames = [];
    attempts = 0;

    const sourceData = (currentMode === 'wanted') ? db.char : db[currentMode];
    target = sourceData[Math.floor(Math.random() * sourceData.length)];
    
    document.getElementById('grid').innerHTML = '';
    hintDisplay.textContent = '';
    input.disabled = false;
    input.value = '';

    if (currentMode === 'wanted') {
        const imgPath = `img/${target.name.split(' ').pop().toLowerCase()}.png`;
        wantedImg.src = imgPath;
        wantedImg.style.filter = "grayscale(1) blur(30px)";
    }
    input.focus();
}

	function showHint() {
    if (gameOver) return;
    if (currentMode === 'wanted') {
        hintDisplay.textContent = `💡 Indice : Équipage : "${target.crew}"`;
    } else {
        hintDisplay.textContent = currentMode === 'char' 
            ? `💡 Indice : Arc "${target.arc}"` 
            : `💡 Indice : Type "${target.type}"`;
    }
}

	function makeGuess(item) {
    guessedNames.push(item.name);
    attempts++;
    checkGuess(item);
    list.innerHTML = '';
    input.value = '';
    input.focus();
}

		input.addEventListener('keydown', (e) => {
		if (e.key === 'Enter') {
        const firstSuggestion = list.querySelector('li');
        if (firstSuggestion) {
            const name = firstSuggestion.getAttribute('data-name');
            const item = db[currentMode].find(i => i.name === name);
            if (item) makeGuess(item);
        } else {
            e.preventDefault(); // Empêche le rafraîchissement si la liste est vide
        }
    }
});

	input.addEventListener('input', () => {
		if (gameOver) return;
		const val = normalizeStr(input.value.trim());
		list.innerHTML = '';
		if (val.length < 1) return;

    const matches = db[currentMode].filter(item => 
        normalizeStr(item.name).includes(val) && !guessedNames.includes(item.name)
    );
    
    matches.forEach((item, index) => {
        const li = document.createElement('li');
        const imgPath = `img/${item.name.split(' ').pop().toLowerCase()}.png`;
        li.setAttribute('data-name', item.name); 
        li.innerHTML = `<img src="${imgPath}" onerror="this.src='https://via.placeholder.com/45'"> <span>${item.name}</span>`;
        
        li.onmousedown = () => makeGuess(item);
        list.appendChild(li);
    });
});

	function checkGuess(guess) {
    addResultRow(guess);
    
    if (currentMode === 'wanted' && !gameOver) {
        // Défloutage progressif
        let newBlur = Math.max(0, 30 - (attempts * 5));
        wantedImg.style.filter = `grayscale(1) blur(${newBlur}px)`;
    }

    if (guess.name === target.name) {
        if (currentMode === 'wanted') wantedImg.style.filter = "grayscale(0) blur(0px)";
        endGame(true);
    }
}

	function addResultRow(item) {
    const row = document.createElement('div');
    const imgPath = `img/${item.name.split(' ').pop().toLowerCase()}.png`;

    if (currentMode === 'wanted') {
        row.className = 'row cols-wanted';
        const status = (item.name === target.name) ? 'correct' : 'wrong';
        row.innerHTML = `
            <div class="cell"><img class="char-pic" src="${imgPath}" onerror="this.src='https://via.placeholder.com/60'"></div>
            <div class="cell ${status}">${item.name}</div>
        `;
    } else {
        // MODE CLASSIQUE (Personnage ou Fruit)
        row.className = currentMode === 'char' ? 'row cols-char' : 'row cols-fruit';
        
        // Image du perso deviné
        const imgCell = document.createElement('div');
        imgCell.className = 'cell';
        imgCell.innerHTML = `<img class="char-pic" src="${imgPath}" onerror="this.src='https://via.placeholder.com/60'">`;
        row.appendChild(imgCell);

        const fields = currentMode === 'char' 
            ? ['gender', 'race', 'crew', 'fruit', 'haki', 'bounty', 'height', 'origin', 'arc']
            : ['owner', 'type', 'appearance', 'origin', 'arc']; 

        fields.forEach(f => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            let status = (item[f] === target[f]) ? 'correct' : 'wrong';

            if (status === 'wrong' && currentMode === 'char') {
                if (f === 'haki' && item[f].split(', ').some(h => target[f].includes(h))) status = 'partial';
                if ((f === 'bounty' || f === 'height') && Math.abs(item[f] - target[f]) <= (f === 'bounty' ? 100000000 : 30)) status = 'partial';
                if (f === 'arc' && Math.abs(arcOrder.indexOf(item[f]) - arcOrder.indexOf(target[f])) <= 3) status = 'partial';
            }
            cell.classList.add(status);

            if (f === 'bounty' && currentMode === 'char') {
                const arrow = item[f] === target[f] ? '' : `<div class="arrow">${item[f] < target[f] ? '▲' : '▼'}</div>`;
                cell.innerHTML = `<div>${formatBounty(item[f])}</div>${arrow}`;
            } else if (f === 'height' || f === 'arc') {
                let arrow = '';
                if (item[f] !== target[f]) {
                    const vI = f === 'height' ? item[f] : arcOrder.indexOf(item[f]);
                    const vT = f === 'height' ? target[f] : arcOrder.indexOf(target[f]);
                    arrow = `<div class="arrow">${vI < vT ? '▲' : '▼'}</div>`;
                }
                cell.innerHTML = `<div>${f === 'height' ? item[f] + "cm" : item[f]}</div>${arrow}`;
            } else {
                cell.textContent = item[f];
            }
            row.appendChild(cell);
        });
    }
    document.getElementById('grid').prepend(row);
}

// Event Listeners (Suggestions)
	input.addEventListener('input', () => {
    if (gameOver) return;
    const val = normalizeStr(input.value.trim());
    list.innerHTML = '';
    if (val.length < 1) return;

    const source = (currentMode === 'wanted') ? db.char : db[currentMode];
    const matches = source.filter(item => normalizeStr(item.name).includes(val) && !guessedNames.includes(item.name));
    
    matches.forEach(item => {
        const li = document.createElement('li');
        const imgPath = `img/${item.name.split(' ').pop().toLowerCase()}.png`;
        li.innerHTML = `<img src="${imgPath}" onerror="this.src='https://via.placeholder.com/45'"> <span>${item.name}</span>`;
        li.onmousedown = () => makeGuess(item);
        list.appendChild(li);
    });
});

	input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const first = list.querySelector('li');
        if (first) {
            const name = first.querySelector('span').textContent;
            const source = (currentMode === 'wanted') ? db.char : db[currentMode];
            const item = source.find(i => i.name === name);
            if (item) makeGuess(item);
        }
    }
});

	function giveUp() {
    if (!gameOver) {
        if (currentMode === 'wanted') wantedImg.style.filter = "grayscale(0) blur(0px)";
        checkGuess(target);
        endGame(false);
    }
}

	function endGame(win) {
    gameOver = true;
    input.disabled = true;
    setTimeout(() => alert(win ? "FÉLICITATIONS ! 🎉" : "DOMMAGE ! C'était : " + target.name), 500);
}

</script>
